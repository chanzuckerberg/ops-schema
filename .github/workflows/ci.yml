name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install validator
        run: pip install -e "validator/.[all,dev]"
      # - name: Lint
      #   run: ruff check validator/
      - name: Test
        run: pytest validator/tests/ -v
