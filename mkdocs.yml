site_name: "| OPS Explorer Documentation"
site_description: A data portal and visualization tool for Optical Pooled Screen data
site_url: https://chanzuckerberg.github.io/ops-schema/
repo_url: https://github.com/chanzuckerberg/ops-schema
repo_name: ops-schema

theme:
  name: material

  custom_dir: docs/overrides

  logo: assets/biohub_logo.png
  favicon: assets/biohub_favicon.png

  palette:

    # Light mode
    - scheme: default
      primary: white
      accent: indigo

      toggle:
        icon: material/lightbulb-outline
        name: Switch to dark mode

    # Dark mode
    - scheme: slate
      primary: black
      accent: indigo

      toggle:
        icon: material/lightbulb
        name: Switch to light mode

  font:
    text: Inter
    code: Inter

  features:
    - navigation.instant
    - navigation.tabs
    - navigation.top
    - navigation.sections
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Explorer Tutorials:
      - Overview: tutorials/index.md
      - Quickstart: tutorials/quickstart/index.md
      - Reference: tutorials/reference/index.md
      - Test Notebook: tutorials/reference/CELL_Diff_Quickstart.ipynb
  - Data Analysis:
      - Overview: analysis/index.md
      - Download Data: analysis/download-data/index.md
      - Inspect Data: analysis/inspect-data/index.md
  - CLI Reference: cli/index.md
  - Data Schema: https://github.com/chanzuckerberg/ops-schema/tree/main/standards/ops

plugins:
  - search
  - awesome-pages
  - mkdocs-jupyter

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tasklist
  - pymdownx.emoji
  - tables
  - toc:
      permalink: true

extra_css:
  - stylesheets/custom.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/chanzuckerberg/ops-schema
