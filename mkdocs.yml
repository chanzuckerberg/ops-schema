site_name: OPS Explorer
site_description: A data portal and visualization tool for Optical Pooled Screen data
site_url: https://chanzuckerberg.github.io/ops-schema/
repo_url: https://github.com/chanzuckerberg/ops-schema
repo_name: ops-schema

theme:
  name: material
  custom_dir: docs/overrides
  logo: assets/biohub_logo.png
  favicon: assets/biohub_favicon.png
  palette:
    - scheme: light
      primary: indigo
      accent: indigo
  font:
    text: Inter
    code: Inter
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.top
    - navigation.sections
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Explorer Tutorial:
      - Overview: tutorials/index.md
      - Quickstart: tutorials/quickstart/index.md
      - Reference: tutorials/reference/index.md
  - Download Data:
      - Overview: download/index.md
      - Processed Images: download/processed-images/index.md
      - Feature Tables: download/feature-tables/index.md
  - CLI Reference: cli/index.md
  - Data Schema: 
    - Overview: schema/index.md
    - Schema Overview: schema/schema-overview/index.md

plugins:
  - search
  - awesome-pages

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tasklist
  - pymdownx.emoji
  - tables
  - toc:
      permalink: true

extra_css:
  - stylesheets/custom.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/chanzuckerberg/ops-schema
