{% extends "base.html" %}

{% block header %}
<header class="md-header" data-md-component="header">
  <div class="md-header__inner">
    <!-- Logo with divider -->
    <a class="md-logo" href="{{ config.site_url }}" title="{{ config.site_name }}">
      <img src="{{ config.theme.logo | url }}" alt="{{ config.site_name }}" />
    </a>
    | OPS Explorer Documentation
    <!-- Navigation Tabs -->
    <nav class="md-tabs" data-md-component="tabs">
      <ul class="md-tabs__list">
        <li class="md-tabs__item">
          <a class="md-tabs__link{% if page and 'index' in page.file.src_path %} md-tabs__link--active{% endif %}" href="{{ config.site_url }}">
            Home
          </a>
        </li>
        <li class="md-tabs__item">
          <a class="md-tabs__link{% if page and 'tutorials' in page.file.src_path %} md-tabs__link--active{% endif %}" href="{{ config.site_url }}tutorials/">
            Explorer Tutorial
          </a>
        </li>
        <li class="md-tabs__item">
          <a class="md-tabs__link{% if page and 'download' in page.file.src_path %} md-tabs__link--active{% endif %}" href="{{ config.site_url }}download/">
            Download Data
          </a>
        </li>
        <li class="md-tabs__item">
          <a class="md-tabs__link{% if page and 'cli' in page.file.src_path %} md-tabs__link--active{% endif %}" href="{{ config.site_url }}cli/">
            CLI Reference
          </a>
        </li>
      </ul>
    </nav>
  </div>
</header>
{% endblock %}

{% block footer %}
<footer class="md-footer">
  <div class="md-footer-meta">
    <div class="md-footer-meta__inner">
      <a href="https://privacy.example.com">Privacy Policy</a>
      <span style="color: rgba(255, 255, 255, 0.3);">|</span>
      <a href="https://terms.example.com">Terms of Use</a>
      <span style="color: rgba(255, 255, 255, 0.3);">|</span>
      <a href="https://dmca.example.com">DMCA Policy</a>
      <span style="color: rgba(255, 255, 255, 0.3);">|</span>
      <a href="https://ethics.example.com">Ethics</a>
      <span style="color: rgba(255, 255, 255, 0.3);">|</span>
      <a href="https://aup.example.com">Acceptable Use Policy</a>
    </div>
    <img src="{{ base_url }}/assets/biohub_logo_black.png" alt="Biohub" class="md-footer__logo">
  </div>
</footer>
{% endblock %}
